services:
  bytestash:
    image: ghcr.io/jordan-dalby/bytestash:latest
    container_name: bytestash
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    volumes:
      - ${DOCKER_CONFIG_DIR}/bytestash:/data/snippets:rw
    environment:
      JWT_SECRET: "${JWT_SECRET}"
      TOKEN_EXPIRY: "24h"
      ALLOW_NEW_ACCOUNTS: "true"
    restart: unless-stopped
    networks:
      - cloudflare_web_network

networks:
  cloudflare_web_network:
    name: cloudflare-web
    external: true
