services:
  # One-shot init: the postgres:alpine image runs internally as uid/gid 70
  # (not root, and it does NOT read PUID/PGID - that's an LSIO-only convention),
  # so a fresh bind-mounted host directory (owned by root) blocks it from
  # creating its data subdirectory. Chown once, then exit.
  sparkyfitness-db-init:
    image: alpine:3.22
    container_name: sparkyfitness-db-init
    command: "chown -R 70:70 /data"
    volumes:
      - "${VOLUME_CONFIG}/sparkyfitness/db:/data"
    networks:
      - sparkyfitness_internal
    restart: "no"

  sparkyfitness-db:
    image: postgres:18.3-alpine
    container_name: sparkyfitness-db
    restart: unless-stopped
    depends_on:
      sparkyfitness-db-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: "${SPARKY_FITNESS_DB_NAME}"
      POSTGRES_USER: "${SPARKY_FITNESS_DB_USER}"
      POSTGRES_PASSWORD: "${SPARKY_FITNESS_DB_PASSWORD}"
      TZ: "${TZ}"
    # Mounted at the parent dir, not /var/lib/postgresql/data: Postgres 18+ images
    # place data in a major-version-specific subdirectory under /var/lib/postgresql
    # and refuse to start if something else already occupies .../data directly.
    volumes:
      - "${VOLUME_CONFIG}/sparkyfitness/db:/var/lib/postgresql"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPARKY_FITNESS_DB_USER} -d ${SPARKY_FITNESS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sparkyfitness_internal

  sparkyfitness-server:
    image: codewithcj/sparkyfitness_server:latest
    container_name: sparkyfitness-server
    restart: unless-stopped
    depends_on:
      sparkyfitness-db:
        condition: service_healthy
    environment:
      NODE_ENV: "production"
      SPARKY_FITNESS_DB_NAME: "${SPARKY_FITNESS_DB_NAME}"
      SPARKY_FITNESS_DB_USER: "${SPARKY_FITNESS_DB_USER}"
      SPARKY_FITNESS_DB_HOST: "sparkyfitness-db"
      SPARKY_FITNESS_DB_PASSWORD: "${SPARKY_FITNESS_DB_PASSWORD}"
      SPARKY_FITNESS_DB_PORT: "5432"
      SPARKY_FITNESS_APP_DB_USER: "${SPARKY_FITNESS_APP_DB_USER}"
      SPARKY_FITNESS_APP_DB_PASSWORD: "${SPARKY_FITNESS_APP_DB_PASSWORD}"
      SPARKY_FITNESS_API_ENCRYPTION_KEY: "${SPARKY_FITNESS_API_ENCRYPTION_KEY}"
      # WARNING: changing BETTER_AUTH_SECRET after users have enabled 2FA will lock them out of their accounts.
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      SPARKY_FITNESS_FRONTEND_URL: "${SPARKY_FITNESS_FRONTEND_URL}"
      SPARKY_FITNESS_DISABLE_SIGNUP: "${SPARKY_FITNESS_DISABLE_SIGNUP}"
      SPARKY_FITNESS_ADMIN_EMAIL: "${SPARKY_FITNESS_ADMIN_EMAIL}"
      SPARKY_FITNESS_LOG_LEVEL: "${SPARKY_FITNESS_LOG_LEVEL:-ERROR}"
      SPARKY_FITNESS_PUBLIC_API_DOCS: "${SPARKY_FITNESS_PUBLIC_API_DOCS}"
      ALLOW_PRIVATE_NETWORK_CORS: "${ALLOW_PRIVATE_NETWORK_CORS}"
      # SPARKY_FITNESS_EXTRA_TRUSTED_ORIGINS: "${SPARKY_FITNESS_EXTRA_TRUSTED_ORIGINS}"
      PUID: "${PUID}"
      PGID: "${PGID}"
      TZ: "${TZ}"
    volumes:
      - "${VOLUME_DATA}/sparkyfitness/backups:/app/backups"
      - "${VOLUME_DATA}/sparkyfitness/uploads:/app/uploads"
    # No healthcheck: no verified HTTP health endpoint exists for this image;
    # omitted rather than guessing at an unconfirmed route or binary (e.g. curl/nc availability unverified).
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sparkyfitness_internal

  sparkyfitness-frontend:
    image: codewithcj/sparkyfitness:latest
    container_name: sparkyfitness-frontend
    restart: unless-stopped
    depends_on:
      - sparkyfitness-server
    environment:
      SPARKY_FITNESS_FRONTEND_URL: "${SPARKY_FITNESS_FRONTEND_URL}"
      SPARKY_FITNESS_SERVER_HOST: "sparkyfitness-server"
      SPARKY_FITNESS_SERVER_PORT: "3010"
      PUID: "${PUID}"
      PGID: "${PGID}"
      TZ: "${TZ}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sparkyfitness_internal
      - cloudflare_web_network

networks:
  sparkyfitness_internal:
    name: sparkyfitness-internal
  cloudflare_web_network:
    name: cloudflare-web
    external: true
