services:
  holyclaude:
    image: coderluii/holyclaude:latest
    container_name: Holyclaude
    hostname: holyclaude
    restart: unless-stopped
    shm_size: 4g
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    ports:
      - 3059:3001
    volumes:
      - ${DOCKER_CONFIG_DIR}/claude/data:/home/claude/.claude:rw
      - ${DOCKER_CONFIG_DIR}/claude/workspace:/workspace:rw
    environment:
      TZ: "${TZ}"
      PUID: "${PUID}"
      PGID: "${PGID}"
      # ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cloudflare_web_network

networks:
  cloudflare_web_network:
    name: cloudflare-web
    external: true
