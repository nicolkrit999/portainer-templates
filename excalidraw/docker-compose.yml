services:
    excalidraw:
        image: excalidraw/excalidraw:latest
        container_name: excalidraw
        restart: unless-stopped
        stdin_open: true
        environment:
            - NODE_ENV=production
        networks:
            - cloudflare_web_network

networks:
    cloudflare_web_network:
        name: cloudflare-web
        external: true
