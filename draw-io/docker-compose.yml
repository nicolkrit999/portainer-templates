services:
  drawio:
    container_name: draw-io
    image: jgraph/drawio
    mem_limit: 16g
    cpu_shares: 768
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - cloudflare_web_network

networks:
  cloudflare_web_network:
    name: cloudflare-web
    external: true
