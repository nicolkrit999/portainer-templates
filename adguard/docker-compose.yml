services:
  adguard:
    image: adguard/adguardhome
    container_name: adguard
    cap_add:
      - NET_ADMIN
    networks:
      adguard_net:
        ipv4_address: ${ADGUARD_STATIC_IP}
        priority: 100
      cloudflare-web:
        priority: 1000 

    volumes:
      - ${DOCKER_CONFIG_DIR}/adguard/work:/opt/adguardhome/work
      - ${DOCKER_CONFIG_DIR}/adguard/conf:/opt/adguardhome/conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  adguard_net:
    driver: macvlan
    driver_opts:
      parent: ${LAN_INTERFACE}
    ipam:
      config:
        - subnet: ${LAN_SUBNET}
          gateway: ${LAN_GATEWAY}
          ip_range: ${ADGUARD_STATIC_IP}/32
  cloudflare-web:
    external: true
