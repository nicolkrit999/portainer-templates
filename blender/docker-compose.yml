services:
  blender:
    image: ghcr.io/linuxserver/blender:latest
    container_name: blender
    hostname: blender
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.000.0.1 8082 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    volumes:
      - /volume2/docker/blender:/config:rw
      - /volume1/Default-volume-1/0001_Docker/blender/projects:/projects:rw
    environment:
      TZ: Europe/Zurich
      CUSTOM_USER: krit
      PASSWORD: ${PASSWORD}
      PUID: 1000
      PGID: 10
      TITLE: Blender
      FILE_MANAGER_PATH: /projects
      WEBPUI_PORT: 8082
    restart: unless-stopped

    networks:
      - cloudflare_web_network

networks:
  cloudflare_web_network:
    name: cloudflare-web
    external: true
