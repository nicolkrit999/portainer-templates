services:
  snapotter:
    image: snapotter/snapotter:latest
    container_name: SnapOtter
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: "${TZ}"
      AUTH_ENABLED: "true"
      # Only needed on first setup to seed the admin account; safe to leave commented after first login.
      # DEFAULT_USERNAME: "krit"
      # DEFAULT_PASSWORD: "${SNAPOTTER_PASSWORD}"
      STORAGE_MODE: "local"
    volumes:
      - ${DOCKER_DATA_DIR}/snapotter:/data:rw
    networks:
      - cloudflare_web_network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

networks:
  cloudflare_web_network:
    name: cloudflare-web
    external: true
