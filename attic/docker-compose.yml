services:
  atticd:
    image: ghcr.io/zhaofengli/attic:latest
    container_name: atticd
    restart: unless-stopped
    command: ["-f", "/etc/atticd/server.toml"]
    user: "${PUID}:${PGID}"
    ports:
      - "8081:8080"
    environment:
      ATTIC_SERVER_TOKEN_RS256_SECRET_BASE64: "${ATTIC_SERVER_TOKEN_RS256_SECRET_BASE64}"
      TZ: "${TZ}"
    volumes:
      - ${DOCKER_CONFIG_DIR}/attic/db:/var/lib/atticd/db
      - ${DOCKER_DATA_DIR}/attic/storage:/var/lib/atticd/storage
      - ${DOCKER_CONFIG_DIR}/attic/config/server.toml:/etc/atticd/server.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      options:
        max-size: "10m"
        max-file: "3"
