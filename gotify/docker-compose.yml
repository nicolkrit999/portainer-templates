services:
  gotify-init:
    image: alpine:latest
    container_name: gotify-init
    user: "0:0"
    command: sh -c "chown -R ${PUID}:${PGID} /app/data && chmod -R 750 /app/data"
    volumes:
      - ${DOCKER_DATA_DIR}/gotify/data:/app/data
    restart: "no"
    networks:
      - cloudflare_web_network

  server:
    container_name: gotify
    image: gotify/server
    user: "${PUID}:${PGID}"
    restart: always
    environment:
      - TZ=${TZ}
      - GOTIFY_SERVER_PORT=80
      - GOTIFY_SERVER_LISTENADDR=0.0.0.0
    volumes:
      - ${DOCKER_DATA_DIR}/gotify/data:/app/data
    networks:
      - cloudflare_web_network

    depends_on:
      gotify-init:
        condition: service_completed_successfully


networks:
  cloudflare_web_network:
    name: cloudflare-web
    external: true
